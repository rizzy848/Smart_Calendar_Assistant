# Production configuration for Fly.io deployment

server.port=${PORT:8080}
spring.application.name=Smart Calendar Assistant

# Logging
logging.level.root=INFO
logging.level.api=INFO
logging.level.Framework=INFO
logging.level.usecase=INFO

# CORS - Set CORS_ORIGINS env var to your Vercel/frontend URL in production
spring.web.cors.allowed-origins=${CORS_ORIGINS:*}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# OAuth Redirect URI
oauth.redirect.uri=${OAUTH_REDIRECT_URI:http://localhost:8080/api/events/auth/callback}

# Error handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s